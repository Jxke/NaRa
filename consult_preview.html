<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nara Consult Preview</title>
    <style>
      :root {
        --paper: #f5f4ef;
        --ink: #101010;
        --rule: #313131;
        --device-size: 200px;
        --preview-scale: 3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(16, 16, 16, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 16, 16, 0.05) 1px, transparent 1px),
          #e8e5da;
        background-size: 18px 18px;
        font-family: "Courier New", monospace;
        color: var(--ink);
      }

      .wrap {
        display: grid;
        gap: 18px;
        justify-items: center;
        padding: 24px;
      }

      .controls {
        width: min(720px, 100%);
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--rule);
        background: rgba(255, 255, 255, 0.72);
      }

      .controls h1 {
        margin: 0;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--rule);
        background: white;
        color: var(--ink);
        font: inherit;
      }

      .screen {
        width: calc(var(--device-size) * var(--preview-scale));
        height: calc(var(--device-size) * var(--preview-scale));
        background: var(--paper);
        border: 2px solid var(--ink);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        position: relative;
        overflow: hidden;
      }

      .screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        background-size: calc(4px * var(--preview-scale)) calc(4px * var(--preview-scale));
        pointer-events: none;
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--device-size);
        height: var(--device-size);
        padding: 8px 8px 6px;
        transform: scale(var(--preview-scale));
        transform-origin: top left;
      }

      .word {
        position: absolute;
        top: 22px;
        left: 0;
        width: 100%;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
      }

      .glyph-layout {
        position: absolute;
        inset: 0;
      }

      .glyph {
        position: absolute;
        width: 48px;
        height: 48px;
      }

      .glyph-frame {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
      }

      .glyph-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        filter: grayscale(1) contrast(1.2);
      }

      .glyph-top-left {
        left: 46px;
        top: 68px;
      }

      .glyph-top-right {
        left: 106px;
        top: 68px;
      }

      .glyph-bottom-center {
        left: 76px;
        top: 118px;
      }

      .footer-rule {
        position: absolute;
        top: 172px;
        left: 20px;
        width: 160px;
        border-top: 1px solid var(--rule);
      }

      .footer {
        position: absolute;
        top: 180px;
        left: 0;
        width: 100%;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-align: center;
      }

      @media (max-width: 760px) {
        .screen {
          --preview-scale: 1.8;
          width: calc(var(--device-size) * var(--preview-scale));
          height: calc(var(--device-size) * var(--preview-scale));
        }

        .control-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="controls">
        <h1>Nara Consult Result Preview</h1>
        <div class="control-grid">
          <label>
            Word
            <input id="wordInput" value="becoming" />
          </label>
          <label>
            Glyph 1
            <input id="glyph1Input" value="venture" />
          </label>
          <label>
            Glyph 2
            <input id="glyph2Input" value="threshold" />
          </label>
          <label>
            Glyph 3
            <input id="glyph3Input" value="opening" />
          </label>
        </div>
      </section>

      <section class="screen">
        <div class="canvas">
          <div id="word" class="word">BECOMING</div>
          <div class="glyph-layout">
            <div class="glyph glyph-top-left">
              <div class="glyph-frame">
                <img id="glyph1Image" src="glyphs/venture.png" alt="venture glyph" />
              </div>
            </div>
            <div class="glyph glyph-top-right">
              <div class="glyph-frame">
                <img id="glyph2Image" src="glyphs/threshold.png" alt="threshold glyph" />
              </div>
            </div>
            <div class="glyph glyph-bottom-center">
              <div class="glyph-frame">
                <img id="glyph3Image" src="glyphs/opening.png" alt="opening glyph" />
              </div>
            </div>
          </div>
          <div class="footer-rule"></div>
          <div class="footer">NARA</div>
        </div>
      </section>
    </main>

    <script>
      const glyphInputs = [
        { input: document.getElementById("glyph1Input"), image: document.getElementById("glyph1Image") },
        { input: document.getElementById("glyph2Input"), image: document.getElementById("glyph2Image") },
        { input: document.getElementById("glyph3Input"), image: document.getElementById("glyph3Image") }
      ];

      const wordInput = document.getElementById("wordInput");
      const word = document.getElementById("word");

      function normalizeGlyphId(value) {
        return value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");
      }

      function updatePreview() {
        word.textContent = wordInput.value.trim().toUpperCase() || "WORD";

        glyphInputs.forEach(({ input, image }) => {
          const glyphId = normalizeGlyphId(input.value);
          image.src = glyphId ? `glyphs/${glyphId}.png` : "";
          image.alt = glyphId ? `${glyphId} glyph` : "glyph preview";
        });
      }

      wordInput.addEventListener("input", updatePreview);
      glyphInputs.forEach(({ input }) => input.addEventListener("input", updatePreview));
      updatePreview();
    </script>
  </body>
</html>
